name: release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version without v prefix (example: 1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  create_tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.derive_version.outputs.release_tag }}
      release_version: ${{ steps.derive_version.outputs.release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Determine release version
        id: derive_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            if ! echo "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid version format: ${version}"
              exit 1
            fi
          else
            latest_tag="$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1)"
            if [ -z "${latest_tag}" ]; then
              version="0.1.0"
            else
              latest_version="${latest_tag#v}"
              IFS='.' read -r major minor patch <<< "${latest_version}"
              version="${major}.${minor}.$((patch + 1))"
            fi
          fi
          tag="v${version}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag already exists: ${tag}"
            exit 1
          fi
          echo "release_version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Create release tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "${{ steps.derive_version.outputs.release_tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.derive_version.outputs.release_tag }}"

  verify:
    runs-on: ubuntu-latest
    needs: create_tag
    env:
      RELEASE_TAG: ${{ needs.create_tag.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.create_tag.outputs.release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run check:oss
      - run: pnpm run check:badges

  publish:
    runs-on: ubuntu-latest
    needs:
      - create_tag
      - verify
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ needs.create_tag.outputs.release_tag }}
      RELEASE_VERSION: ${{ needs.create_tag.outputs.release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Derive release version
        run: |
          if ! echo "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release tag: ${RELEASE_TAG}"
            exit 1
          fi
          if [ "${RELEASE_VERSION}" != "${RELEASE_TAG#v}" ]; then
            echo "Release version mismatch: ${RELEASE_VERSION} vs ${RELEASE_TAG#v}"
            exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Sync package version with release tag
        run: pnpm pkg set version="${RELEASE_VERSION}"
      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --provenance --access public --no-git-checks
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${RELEASE_TAG}" --verify-tag --generate-notes
      - name: Publish provenance summary
        run: |
          echo "Package published with npm provenance via GitHub Actions." >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${RELEASE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: ${RELEASE_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "npm package: https://www.npmjs.com/package/sync-ai-context" >> "$GITHUB_STEP_SUMMARY"
