name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver version without v prefix (example: 1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  create_tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: ${{ inputs.version }}"
            exit 1
          fi
      - name: Create release tag
        run: |
          tag="v${{ inputs.version }}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag already exists: ${tag}"
            exit 1
          fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "${tag}" "${GITHUB_SHA}"
          git push origin "${tag}"

  verify:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test
      - run: pnpm run build
      - run: pnpm run check:oss
      - run: pnpm run check:badges

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
      id-token: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Derive release version
        run: |
          if ! echo "${RELEASE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid release tag: ${RELEASE_TAG}"
            exit 1
          fi
          echo "RELEASE_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Sync package version with release tag
        run: pnpm pkg set version="${RELEASE_VERSION}"
      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --provenance --access public --no-git-checks
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
      - name: Publish provenance summary
        run: |
          echo "Package published with npm provenance via GitHub Actions." >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: ${RELEASE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: ${RELEASE_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "npm package: https://www.npmjs.com/package/sync-ai-context" >> "$GITHUB_STEP_SUMMARY"
