schema: spec-driven
context: |
  技术栈：TypeScript + Node.js，使用 Rslib 构建，Rstest 测试框架。
  包管理器：pnpm。
  Node.js 工具命令约定：使用 npx 前缀执行（例如 npx tsc、npx eslint）。
  通用上下文只保留稳定成立的工程约束、编码规则、协作规则和边界围栏，不写具体业务逻辑、阶段性产品结论或“暂时不实现 xxx”。
  工程约束：
  - 修改代码时必须修复 ESLint Error 和 TypeScript Error。
  - 忽略 ESLint Warning 与纯格式化问题（Prettier）。
  - 禁止使用 any。
  - 优先使用 Root-Import（@/）。
  开发方式：
  - 采用 TDD（red -> green -> refactor）。
  - 先写测试用例，再实现功能代码。
  - 所有测试统一使用 rstest。
  - 任务完成后必须检查是否需要更新文档；若对外行为、约束、命令、配置、示例或流程有变化，则必须同步更新文档。

rules:
  proposal:
    - 业务范围、非目标、阶段性限制必须写在 proposal/design/specs/tasks，不得写入通用 context。
    - 必须明确写出当前变更范围与非目标。
    - Capabilities 必须可映射到可测试规范，不写空泛目标。
  design:
    - 必须明确当前变更涉及的关键设计决策、行为语义与冲突处理策略。
    - 必须写明测试策略为 rstest + TDD。
    - 若实现影响用户或维护者认知，必须说明需要同步更新哪些文档。
  specs:
    - 每个需求必须可测试，并至少包含一个场景。
    - 必须包含测试相关要求，明确测试先行与验证方式。
  tasks:
    - 任务必须先安排测试用例编写，再安排实现任务。
    - 任务拆分需按可独立验证的小步推进。
    - 任务中必须显式包含文档检查；若文档需要更新，必须有对应文档任务并在实现完成后收尾。
